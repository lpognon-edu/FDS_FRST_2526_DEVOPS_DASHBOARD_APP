<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">DevOps Dashboard</span>
        </div>
    </nav>
    <main class="container-fluid p-4">
        <h1 class="mb-4">Deployment Status</h1>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Production</h5>
                        <p class="card-text">
                            <span class="badge bg-success">● LIVE</span>
                        </p>
                        <small class="text-muted">Last deploy: 2026-03-30 14:32 UTC</small>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Staging</h5>
                        <p class="card-text">
                            <span class="badge bg-success">● LIVE</span>
                        </p>
                        <small class="text-muted">Last deploy: 2026-03-30 13:15 UTC</small>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Development</h5>
                        <p class="card-text">
                            <span class="badge bg-warning">● UPDATING</span>
                        </p>
                        <small class="text-muted">Last deploy: 2026-03-30 15:45 UTC</small>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
