<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidents - DevOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .spinner-border { width: 1.5rem; height: 1.5rem; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .badge-custom { font-size: 0.875rem; }
        .severity-Low { background-color: #d4edda; color: #155724; }
        .severity-Medium { background-color: #fff3cd; color: #856404; }
        .severity-High { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">DevOps Dashboard</span>
            <ul class="navbar-nav ms-auto flex-row gap-3">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="incidents.html">Incidents</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container-fluid p-4">
        <div class="row mb-4">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <h1>Incidents Management</h1>
                <button class="btn btn-success btn-lg" id="newIncidentBtn">
                    <i class="bi bi-plus-circle"></i> New Incident
                </button>
            </div>
        </div>

        <!-- Loading state -->
        <div id="loadingSpinner" class="text-center p-5" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Loading incidents...</p>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="alert alert-info" role="alert" style="display: none;">
            <h5>No incidents yet</h5>
            <p>Click "New Incident" to create your first incident.</p>
        </div>

        <!-- Incidents table -->
        <div id="tableContainer" class="card border-0 shadow-sm" style="display: none;">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">All Incidents (<span id="incidentCount">0</span>)</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 5%;">ID</th>
                                <th style="width: 30%;">Title</th>
                                <th style="width: 40%;">Description</th>
                                <th style="width: 15%;">Severity</th>
                                <th style="width: 10%;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="incidentsTableBody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Incident Modal -->
    <div class="modal fade" id="incidentModal" tabindex="-1" aria-labelledby="incidentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="incidentModalLabel">New Incident</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="incidentForm">
                    <div class="modal-body">
                        <input type="hidden" id="incidentId" value="">
                        
                        <div class="mb-3">
                            <label for="incidentTitle" class="form-label">Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="incidentTitle" placeholder="Brief incident description" required>
                            <small class="form-text text-muted">Required field</small>
                        </div>

                        <div class="mb-3">
                            <label for="incidentDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="incidentDescription" rows="4" placeholder="Detailed incident information..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="incidentSeverity" class="form-label">Severity <span class="text-danger">*</span></label>
                            <select class="form-select" id="incidentSeverity" required>
                                <option value="">-- Select Severity --</option>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">
                            <span id="submitBtnText">Save Incident</span>
                            <span id="submitBtnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/incidents.js"></script>
</body>
</html>
